# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/pulumi/ci-mgmt

name: "Build Provider"

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: Version of the provider to build
      matrix:
        required: false
        type: string
        default: |
          {
            "platform": [
              {"os": "linux",   "arch": "amd64"},
              {"os": "linux",   "arch": "arm64"},
              {"os": "darwin",  "arch": "amd64"},
              {"os": "darwin",  "arch": "arm64"}
            ]
          }

jobs:
  build_provider:
    name: Build ${{ matrix.platform.os }}-${{ matrix.platform.arch }}
    runs-on: ubuntu-latest
    env:
      PROVIDER_VERSION: ${{ inputs.version }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: true
      matrix: ${{ fromJSON(inputs.matrix) }}
    permissions:
      contents: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false      
          submodules: true
      - name: Install ldid
        run: |
          set -e
          case "${{ matrix.platform.os }}-${{ matrix.platform.arch }}" in
            linux-amd64)
              ARCH=linux_x86_64
              ;;
            linux-arm64)
              ARCH=linux_arm64
              ;;
            darwin-amd64)
              ARCH=darwin_x86_64
              ;;
            darwin-arm64)
              ARCH=darwin_arm64
              ;;
            *)
              echo "Unsupported platform: ${{ matrix.platform.os }}-${{ matrix.platform.arch }}"
              exit 1
              ;;
          esac
          URL="https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus2/ldid_${ARCH}"
          curl -L "$URL" -o ldid
          chmod +x ldid
          sudo mv ldid /usr/local/bin/ldid
      - name: Setup mise
        uses: jdx/mise-action@146a28175021df8ca24f8ee1828cc2a60f980bd5 # v3
        env:
          MISE_FETCH_REMOTE_VERSIONS_TIMEOUT: 30s
        with:
          version: 2026.3.7
          cache_save: false
      # Based on https://github.com/actions/cache/blob/main/examples.md#go---modules
      - name: Get GOCACHE
        id: gocache
        shell: bash
        run: |
          echo "path=$(go env GOCACHE)" >> "${GITHUB_OUTPUT}"
      - name: Get GOMODCACHE
        id: gomodcache
        shell: bash
        run: |
          echo "path=$(go env GOMODCACHE)" >> "${GITHUB_OUTPUT}"
      - name: Go Cache
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5
        with:
          path: |
            ${{ steps.gocache.outputs.path }}
            ${{ steps.gomodcache.outputs.path }}
          key: go-provider-${{ matrix.platform.os }}-${{ matrix.platform.arch }}-${{ hashFiles('provider/go.sum') }}
          restore-keys: |
            go-provider-${{ matrix.platform.os }}-${{ matrix.platform.arch }}-
      - name: Prepare local workspace before restoring previously built
        run: make prepare_local_workspace
      - name: Restore prerequisites
        uses: ./.github/actions/download-prerequisites
      - name: Restore makefile progress
        # This mirrors the targets completed in the prerequisites job
        run: make --touch provider schema

      - name: Build provider
        run: make "provider-${{ matrix.platform.os }}-${{ matrix.platform.arch }}"

      - name: Package provider
        run: make provider_dist-${{ matrix.platform.os }}-${{ matrix.platform.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pulumi-resource-cosmo-v${{ inputs.version }}-${{ matrix.platform.os }}-${{ matrix.platform.arch }}.tar.gz
          path: bin/pulumi-resource-cosmo-v${{ inputs.version }}-${{ matrix.platform.os }}-${{ matrix.platform.arch }}.tar.gz
          retention-days: 30
